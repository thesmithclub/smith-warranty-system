<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE SMITH - 보증서 관리 시스템</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .login-divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
      color: var(--smith-text-muted);
      font-size: 13px;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--smith-border);
    }
    .login-divider::before { left: 0; }
    .login-divider::after { right: 0; }
    .customer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--smith-text-muted);
    }
    .customer-link a {
      color: var(--smith-green);
      font-weight: 600;
      text-decoration: none;
    }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <!-- 로고 이미지가 있으면 아래 img 태그 활성화 -->
        <!-- <img src="images/logo.png" alt="THE SMITH"> -->
        <div style="margin-bottom:12px;">
          <img src="https://smith.speedgabia.com/logo_data/the_smith_logo.png" alt="THE SMITH" style="height:48px; object-fit:contain;">
        </div>
        <h2>보증서 등록 및 관리</h2>
        <p>대리점 / 관리자 로그인</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" id="email" class="form-control" placeholder="아이디 입력" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="password" class="form-control" placeholder="비밀번호 입력" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          로그인
        </button>
      </form>

    </div>
  </div>

  <!-- 데모 모드 (Supabase 연결 전 로컬 테스트용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-data.js"></script>
  <script src="js/config.js"></script>
  <script>
    // 이미 로그인된 경우 대시보드로
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'admin/dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 로그인 중...';
      errMsg.style.display = 'none';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errMsg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
        return;
      }

      window.location.href = 'admin/dashboard.html';
    });
  </script>
</body>
</html>
