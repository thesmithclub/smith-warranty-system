<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보증서 조회 - THE SMITH</title>
  <link rel="stylesheet" href="../css/admin-theme.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      background: var(--surface-2); border-radius: 14px; padding: 16px 20px;
      margin-bottom: 20px;
    }
    .filter-bar .form-control { font-size: 13px; padding: 8px 12px; }
    .filter-bar input[type="date"] { min-width: 140px; }
    .filter-bar input[type="text"] { min-width: 240px; flex: 1; }
    .filter-sep { color: var(--text-3); font-size: 13px; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--text-2); white-space: nowrap; }

    /* 대리점 검색 자동완성 */
    .dealer-search-wrap { position: relative; min-width: 180px; }
    .dealer-search-wrap input { width: 100%; box-sizing: border-box; }
    .dealer-dropdown {
      display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2); max-height: 240px; overflow-y: auto;
      margin-top: 4px;
    }
    .dealer-dropdown.open { display: block; }
    .dealer-option {
      padding: 9px 14px; font-size: 13px; cursor: pointer; color: var(--text-1);
    }
    .dealer-option:hover, .dealer-option.active { background: var(--surface-2); }
    .dealer-option.all { color: var(--text-2); font-style: italic; }

    .wt-table-wrap { overflow-x: auto; scrollbar-gutter: stable; }
    .wt-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .wt-table th {
      background: var(--surface-2); padding: 10px 12px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--text-2);
      border-bottom: 2px solid var(--border); white-space: nowrap;
    }
    .wt-table th.col-badge  { width: 76px; }
    .wt-table th.col-num    { width: 148px; }
    .wt-table th.col-name   { width: 80px; }
    .wt-table th.col-car    { width: 90px; }
    .wt-table th.col-carnum { width: 100px; }
    .wt-table th.col-date   { width: 96px; }
    .wt-table th.col-dealer { width: 100px; }
    .wt-table th.col-act    { width: 1%; white-space: nowrap; }
    .wt-table td { white-space: nowrap; }
    .wt-table td {
      padding: 11px 12px; border-bottom: 1px solid var(--border);
      vertical-align: middle; color: var(--text-1);
    }
    .wt-table tr:hover td { background: var(--surface-2); }
    .wt-table tr:last-child td { border-bottom: none; }

    .badge-sent    { background: #d4f5e2; color: #1a7a43; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: #fff3cd; color: #856404; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }

    .wt-count { font-size: 13px; color: var(--text-2); margin-bottom: 10px; }
    .wt-count span { font-weight: 700; color: var(--text-1); }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-3); font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

    /* 액션 버튼 */
    .act-btn {
      display: inline-block; padding: 5px 10px; border-radius: 7px;
      font-size: 11px; font-weight: 600; cursor: pointer; border: none;
      white-space: nowrap;
    }
    .act-btn-img  { background: var(--primary); color: #fff; }
    .act-btn-edit { background: var(--surface-2); color: var(--text-1); border: 1px solid var(--border); }
    .act-btn-del  { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .act-btn:hover { opacity: .85; }

    /* 모달 공통 */
    .wt-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 300;
      align-items: center; justify-content: center;
    }
    .wt-overlay.open { display: flex; }
    .wt-modal {
      background: var(--bg); border-radius: 20px; padding: 28px;
      width: 94%; max-height: 88vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .d-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-input-sm {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; background: var(--bg);
      color: var(--text-1); box-sizing: border-box; font-family: inherit;
    }
    .form-input-sm:focus { outline: none; border-color: var(--primary); }

    /* 보증서 이미지 모달 */
    #warrantyImgModal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88); overflow-y: auto;
    }
    #warrantyImgModal.open {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px; min-height: 100%;
    }
    #warrantyImgContainer {
      position: relative; width: 794px; height: 1123px;
      overflow: hidden; background: white; flex-shrink: 0;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #warrantyImgContainer img.wi-bg {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    }
    .wi-field {
      position: absolute; font-size: 13px; font-weight: 700;
      color: #1a1a1a; white-space: nowrap; line-height: 1;
    }
    .wi-sm { font-size: 11px; }
    .wi-center { text-align: center; }
    .wi-right { transform: translateX(-100%); text-align: right; }
  </style>
</head>

<script>

let allWarranties = [];
let dealerMap    = {};
let allDealers   = [];
let selectedDealerId = '';
let currentDealerIdFilter = '';
let isAdmin = false;
let currentEditWarranty = null;

// ── 초기화 ──
async function init() {
  const session = await requireAuth('../index.html');
  if (!session) return;
  const profile = await getCurrentProfile();
  if (!profile) return;

  document.getElementById('sidebarName').textContent = profile.dealer_name;
  document.getElementById('sidebarRole').textContent = profile.role === 'admin' ? '관리자' : '대리점';

  isAdmin = profile.role === 'admin';

  if (isAdmin) {
    document.getElementById('navStock').style.display    = 'none';
    document.getElementById('navStats').style.display    = 'flex';
    document.getElementById('navDealers').style.display  = 'flex';
    document.getElementById('navProducts').style.display = 'flex';
    document.getElementById('navInventory').style.display= 'flex';
    document.getElementById('navPopup').style.display    = 'flex';
    allDealers = getUsers().filter(u => u.role === 'dealer')
      .sort((a, b) => (a.dealer_name||'').localeCompare(b.dealer_name||''));
    allDealers.forEach(d => { dealerMap[d.id] = d.dealer_name; });
    document.addEventListener('click', e => {
      if (!e.target.closest('.dealer-search-wrap')) closeDealerDropdown();
    });
  } else {
    currentDealerIdFilter = profile.id;
    document.querySelector('.dealer-search-wrap').style.display = 'none';
    document.getElementById('navPopup').style.display = 'none';
  }

  allWarranties = getWarranties().filter(x => !x.archived).sort((a, b) =>
    b.service_date.localeCompare(a.service_date)
  );

  renderTable();
}

// ── 대리점 검색 자동완성 ──
function onDealerInput() {
  const q = document.getElementById('fDealerInput').value.trim().toLowerCase();
  if (selectedDealerId && dealerMap[selectedDealerId] !== document.getElementById('fDealerInput').value) {
    selectedDealerId = '';
    renderTable();
  }
  renderDealerDropdown(q);
  openDealerDropdown();
}

function renderDealerDropdown(q) {
  const filtered = q
    ? allDealers.filter(d => d.dealer_name.toLowerCase().includes(q))
    : allDealers;
  const dd = document.getElementById('dealerDropdown');
  dd.innerHTML =
    `<div class="dealer-option all" onclick="selectDealer('','')">전체 대리점</div>` +
    filtered.map(d =>
      `<div class="dealer-option${selectedDealerId===d.id?' active':''}"
        onclick="selectDealer('${d.id}','${d.dealer_name.replace(/'/g,"\\'")}')">
        ${d.dealer_name}
      </div>`
    ).join('');
}

function openDealerDropdown() {
  renderDealerDropdown(document.getElementById('fDealerInput').value.trim().toLowerCase());
  document.getElementById('dealerDropdown').classList.add('open');
}

function closeDealerDropdown() {
  document.getElementById('dealerDropdown').classList.remove('open');
}

function selectDealer(id, name) {
  selectedDealerId = id;
  document.getElementById('fDealerInput').value = name;
  closeDealerDropdown();
  renderTable();
}

// ── 테이블 렌더 ──
function renderTable() {
  const dateFrom = document.getElementById('fDateFrom').value;
  const dateTo   = document.getElementById('fDateTo').value;
  const keyword  = document.getElementById('fKeyword').value.trim().toLowerCase();
  const dealerId = currentDealerIdFilter || selectedDealerId;

  let list = allWarranties.filter(w => {
    if (dateFrom && w.service_date < dateFrom) return false;
    if (dateTo   && w.service_date > dateTo)   return false;
    if (dealerId && w.dealer_id !== dealerId)   return false;
    if (keyword) {
      const target = [
        w.customer_name  || '',
        w.car_number     || '',
        w.car_vin        || '',
        w.customer_phone || '',
      ].join(' ').toLowerCase();
      if (!target.includes(keyword)) return false;
    }
    return true;
  });

  document.getElementById('resultCount').innerHTML =
    `총 <span>${list.length.toLocaleString()}</span>건`;

  const tbody = document.getElementById('warrantyTbody');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>검색 결과가 없습니다.</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(w => `
    <tr>
      <td><span class="${w.kakao_sent ? 'badge-sent' : 'badge-pending'}">${w.kakao_sent ? '발송완료' : '미발송'}</span></td>
      <td style="font-family:monospace; font-size:12px; color:var(--text-2);">${w.warranty_number}</td>
      <td style="font-weight:600;">${w.customer_name}</td>
      <td>${w.customer_car}</td>
      <td>${w.car_number}</td>
      <td>${w.service_date}</td>
      <td>${dealerMap[w.dealer_id] || '-'}</td>
      <td style="white-space:nowrap;">
        <button class="act-btn act-btn-img" onclick="showWarrantyImage('${w.id}')">🖼 보증서</button>
        <button class="act-btn act-btn-edit" onclick="openEditModal('${w.id}')" style="margin-left:4px;">✏ 수정</button>
        ${isAdmin ? `<button class="act-btn act-btn-del" onclick="deleteWarranty('${w.id}')" style="margin-left:4px;">🗑 삭제</button>` : ''}
      </td>
    </tr>
  `).join('');
}

function resetFilters() {
  document.getElementById('fDateFrom').value  = '';
  document.getElementById('fDateTo').value    = '';
  document.getElementById('fKeyword').value   = '';
  document.getElementById('fDealerInput').value = '';
  selectedDealerId = '';
  renderTable();
}

// ── 수정 모달 ──
function openEditModal(id) {
  const w = allWarranties.find(x => x.id === id);
  if (!w) return;
  currentEditWarranty = w;

  document.getElementById('editWarrantyNumber').textContent = w.warranty_number;

  const fields = [
    'customer_name','customer_phone','customer_car','customer_address',
    'car_number','car_vin','service_date','service_price',
    'front_product','front_spec','side1_product','side1_spec',
    'side2_product','side2_spec','side3_product','side3_spec',
    'rear_product','rear_spec','glass_roof_product','glass_roof_spec',
    'panorama_product','panorama_spec',
    'shop_name','shop_phone','shop_address','installer_name',
  ];
  fields.forEach(f => {
    const el = document.getElementById('e_' + f);
    if (el) el.value = w[f] || '';
  });

  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveEdit() {
  const w = currentEditWarranty;
  if (!w) return;

  // 시공위치: 제품 선택 시 농도 필수
  const posKeys = ['front','side1','side2','side3','rear','glass_roof','panorama'];
  const posLabels = { front:'전면', side1:'측면1열', side2:'측면2열', side3:'측면3열', rear:'후면', glass_roof:'글래스루프', panorama:'파노라마' };
  for (const key of posKeys) {
    const prod = document.getElementById('e_' + key + '_product')?.value;
    const spec = document.getElementById('e_' + key + '_spec')?.value;
    if (prod && !spec) {
      showToast(`${posLabels[key]} 농도를 선택해 주세요.`, 'error');
      return;
    }
  }

  const fields = [
    'customer_name','customer_phone','customer_car','customer_address',
    'car_number','car_vin','service_date','service_price',
    'front_product','front_spec','side1_product','side1_spec',
    'side2_product','side2_spec','side3_product','side3_spec',
    'rear_product','rear_spec','glass_roof_product','glass_roof_spec',
    'panorama_product','panorama_spec',
    'installer_name',
  ];

  const updates = {};
  fields.forEach(f => {
    const el = document.getElementById('e_' + f);
    if (el) updates[f] = f === 'service_price' ? (Number(el.value) || 0) : el.value;
  });

  const ws = getWarranties();
  const idx = ws.findIndex(x => x.id === w.id);
  if (idx > -1) { ws[idx] = { ...ws[idx], ...updates }; saveWarranties(ws); }

  allWarranties = getWarranties().filter(x => !x.archived).sort((a, b) => b.service_date.localeCompare(a.service_date));
  closeEditModal();
  renderTable();
  showToast('수정되었습니다.', 'success');
}

// ── 아카이브 (관리자 전용) ──
function deleteWarranty(id) {
  const w = allWarranties.find(x => x.id === id);
  if (!w) return;
  if (!confirm(`보증서 [${w.warranty_number}]를 아카이브합니다.\n아카이브된 보증서는 대리점·고객 조회에서 숨겨집니다.`)) return;

  const ws = getWarranties();
  const idx = ws.findIndex(x => x.id === id);
  if (idx > -1) { ws[idx] = { ...ws[idx], archived: true }; saveWarranties(ws); }

  allWarranties = getWarranties().filter(x => !x.archived).sort((a, b) => b.service_date.localeCompare(a.service_date));
  renderTable();
  showToast('보증서가 아카이브 처리되었습니다.', 'success');
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function wrapField(text, maxLen) {
  if (!text || text.length <= maxLen) return escHtml(text);
  const lines = [];
  let rem = text;
  while (rem.length > maxLen) { lines.push(rem.slice(0, maxLen)); rem = rem.slice(maxLen); }
  if (rem) lines.push(rem);
  return lines.map(escHtml).join('<br>');
}
function maskPhone(p) {
  if (!p) return '';
  return p.replace(/(\d{3})-?(\d{4})-?(\d{4})/, '$1-****-$3');
}

function showWarrantyImage(id) {
  const w = allWarranties.find(x => x.id === id);
  if (!w) return;

  const container = document.getElementById('warrantyImgContainer');
  container.querySelectorAll('.wi-field').forEach(s => s.remove());

  const data = {
    customer_name: w.customer_name,
    customer_phone: maskPhone(w.customer_phone),
    customer_car: w.customer_car,
    customer_address: w.customer_address || '',
    car_number: w.car_number,
    car_vin: w.car_vin || '',
    service_date: w.service_date,
    warranty_number: w.warranty_number,
    service_price: w.service_price ? '₩ ' + Number(w.service_price).toLocaleString() : '',
    front_product: w.front_product || '', side1_product: w.side1_product || '',
    side2_product: w.side2_product || '', side3_product: w.side3_product || '',
    rear_product: w.rear_product || '', glass_roof_product: w.glass_roof_product || '',
    panorama_product: w.panorama_product || '',
    front_spec: w.front_spec || '', side1_spec: w.side1_spec || '',
    side2_spec: w.side2_spec || '', side3_spec: w.side3_spec || '',
    rear_spec: w.rear_spec || '', glass_roof_spec: w.glass_roof_spec || '',
    panorama_spec: w.panorama_spec || '',
    shop_name: w.shop_name || '', shop_address: w.shop_address || '',
    shop_phone: w.shop_phone || '', installer_name: w.installer_name || '',
  };

  Object.entries(data).forEach(([key, val]) => {
    const pos = WI_POS[key];
    if (!pos) return;
    const span = document.createElement('span');
    span.className = 'wi-field' + (pos.cls ? ' ' + pos.cls : '');
    span.style.top  = pos.top + '%';
    span.style.left = pos.left + '%';
    if (pos.width) span.style.width = pos.width;
    if (key === 'customer_address' && val.length > 21) {
      span.style.whiteSpace = 'normal';
      span.style.lineHeight  = '1.45';
      span.style.width = '32%';
      span.innerHTML = wrapField(val, 21);
    } else if (key.endsWith('_product') && val.length > 12) {
      span.style.whiteSpace = 'normal';
      span.style.lineHeight  = '1.3';
      span.innerHTML = wrapField(val, 12);
    } else {
      span.textContent = val;
    }
    container.appendChild(span);
  });

  document.getElementById('warrantyImgModal').classList.add('open');
}

function closeWarrantyImg() {
  document.getElementById('warrantyImgModal').classList.remove('open');
}

// ESC 키로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeWarrantyImg();
    closeEditModal();
  }
});

// 이미지 모달 배경 클릭 시 닫기
document.getElementById('warrantyImgModal').addEventListener('click', function(e) {
  if (e.target === this) closeWarrantyImg();
});

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
